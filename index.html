<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岡中 QR 點名系統</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  text-align: center;
}

#nav {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

#nav button {
  padding: 10px 20px;
  border: none;
  cursor: pointer;
  border-radius: 8px;
  background: #eee;
}

#nav .active {
  background: #42a5f5;
  color: white;
}

.tab {
  display: none;
}

.active-tab {
  display: block;
}

table {
  border-collapse: collapse;
  margin: 20px auto;
  max-width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px 10px;
  white-space: nowrap;
  text-align: center;
}

button.action {
  background: #42a5f5;
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 6px;
  cursor: pointer;
}

button.action:hover {
  background: #1e88e5;
}

#progress {
  margin-top: 10px;
  font-weight: bold;
  white-space: pre-line;
}

select {
  font-size: 16px;
  padding: 6px 10px;
}

.table-wrap {
  overflow-x: auto;
  width: 100%;
}

input[type="checkbox"] {
  transform: scale(1.2);
}

#selectedCount {
  display: inline-block;
  margin-left: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="nav">
  <button id="btn-send" class="active" onclick="showTab('send', this)">📤 發信</button>
  <button id="btn-query" onclick="showTab('query', this)">📊 查詢</button>
</div>

<div id="tab-send" class="tab active-tab">
  <h3>📤 發送點名信</h3>

  <select id="courseSelect" onchange="loadStudents()">
    <option value="">載入中...</option>
  </select>
  <span id="selectedCount">（已勾選 0 筆）</span>

  <br><br>

  <button class="action" onclick="sendEmails('test')">發測試信</button>
  <button class="action" onclick="sendEmails('student')">發正式信</button>

  <div id="progress"></div>

  <div class="table-wrap">
    <div id="studentTable"></div>
  </div>
</div>

<div id="tab-query" class="tab">
  <h3>📊 查詢出缺席</h3>

  <select id="filterSelect" onchange="loadFiltered()">
    <option value="">載入中...</option>
  </select>

  <br><br>

  <div id="summary"></div>

  <div class="table-wrap">
    <div id="queryTable"></div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzjYAa1a2pL4sNtRmqayPKQfhLvEK0l21Qd5LJuhQvSeYFXwvgGMWr5i14HN24xiNF7/exec";

let studentData = [];

/************** UI **************/
function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
  document.getElementById('tab-' + name).classList.add('active-tab');

  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

/************** JSONP API **************/
function callApi(action, data = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

    const params = new URLSearchParams({
      action,
      mode: "api",
      callback: callbackName
    });

    Object.entries(data).forEach(([k, v]) => {
      if (typeof v === "object") {
        params.append(k, JSON.stringify(v));
      } else if (v !== undefined && v !== null) {
        params.append(k, v);
      }
    });

    const url = GAS_URL + "?" + params.toString();

    const script = document.createElement("script");

    window[callbackName] = function(res) {
      try {
        if (!res || res.status !== "success") {
          reject(new Error((res && res.message) || "API 執行失敗"));
        } else {
          resolve(res);
        }
      } finally {
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }
    };

    script.onerror = function() {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error("JSONP 載入失敗"));
    };

    script.src = url;
    document.body.appendChild(script);
  });
}

/************** 載入課程 **************/
async function loadCourseNames() {
  const select = document.getElementById("courseSelect");
  const progress = document.getElementById("progress");
  select.innerHTML = "<option value=''>載入中...</option>";

  try {
    const res = await callApi("getCourseNames");
    const items = res.data.items || [];

    select.innerHTML = "<option value=''>請選擇課程</option>";

    items.forEach(name => {
      const op = document.createElement("option");
      op.value = name;
      op.text = name;
      select.appendChild(op);
    });

    progress.innerText = `✅ 已載入 ${items.length} 門課程`;
  } catch (err) {
    select.innerHTML = "<option value=''>課程載入失敗</option>";
    progress.innerText = "❌ 課程無法載入：\n" + err.message;
  }
}

/************** 載入學生 **************/
async function loadStudents() {
  const course = document.getElementById("courseSelect").value;
  if (!course) return;

  const progress = document.getElementById("progress");

  try {
    progress.innerText = "資料載入中...";

    const res = await callApi("getStudentsByCourse", { courseName: course });
    studentData = res.data.items || [];

    if (!studentData.length) {
      document.getElementById("studentTable").innerHTML = "⚠ 無資料";
      progress.innerText = "⚠ 查無學生資料";
      updateSelectedCount();
      return;
    }

    const [headers, ...rows] = studentData;

    let html = "<table><tr>";
    html += "<th><input type='checkbox' id='checkAll' onclick='toggleAll(this)'></th>";
    html += "<th>編號</th>";
    headers.forEach(h => html += "<th>" + escapeHtml(h) + "</th>");
    html += "</tr>";

    rows.forEach((row, i) => {
      html += "<tr>";
      html += `<td><input type="checkbox" class="row-check" data-index="${i + 1}" onchange="updateSelectedCount()"></td>`;
      html += `<td>${i + 1}</td>`;
      row.forEach(cell => {
        html += "<td>" + escapeHtml(cell) + "</td>";
      });
      html += "</tr>";
    });

    html += "</table>";

    document.getElementById("studentTable").innerHTML = html;
    progress.innerText = `✅ 已載入 ${rows.length} 位學生`;
    updateSelectedCount();
  } catch (err) {
    progress.innerText = "❌ 載入學生失敗：\n" + err.message;
  }
}

function toggleAll(master) {
  const boxes = document.querySelectorAll(".row-check");
  boxes.forEach(box => box.checked = master.checked);
  updateSelectedCount();
}

function updateSelectedCount() {
  const checkedCount = document.querySelectorAll(".row-check:checked").length;
  document.getElementById("selectedCount").innerText = `（已勾選 ${checkedCount} 筆）`;

  const allBoxes = document.querySelectorAll(".row-check");
  const master = document.getElementById("checkAll");

  if (master) {
    if (allBoxes.length === 0) {
      master.checked = false;
      master.indeterminate = false;
    } else if (checkedCount === 0) {
      master.checked = false;
      master.indeterminate = false;
    } else if (checkedCount === allBoxes.length) {
      master.checked = true;
      master.indeterminate = false;
    } else {
      master.checked = false;
      master.indeterminate = true;
    }
  }
}

/************** 發信：只寄勾選者 **************/
async function sendEmails(mode) {
  if (studentData.length <= 1) {
    alert("請先選擇課程");
    return;
  }

  const checkedBoxes = Array.from(document.querySelectorAll(".row-check:checked"));
  if (checkedBoxes.length === 0) {
    alert("請先勾選要寄信的學生");
    return;
  }

  const progress = document.getElementById("progress");

  for (let i = 0; i < checkedBoxes.length; i++) {
    progress.innerText = `📨 發送中 ${i + 1}/${checkedBoxes.length}`;

    const rowIndex = Number(checkedBoxes[i].dataset.index);
    const row = studentData[rowIndex];
    const obj = {};

    studentData[0].forEach((h, j) => obj[h] = row[j]);

    try {
      await callApi("sendSingleEmail", { rowObj: obj, mode });
    } catch (err) {
      progress.innerText = `❌ 第 ${i + 1} 封發送失敗：\n` + err.message;
      return;
    }
  }

  progress.innerText = `✅ 已完成發送 ${checkedBoxes.length} 封信件`;
}

/************** 查詢選單 **************/
async function loadOptions() {
  const select = document.getElementById("filterSelect");
  select.innerHTML = "<option value=''>載入中...</option>";

  try {
    const res = await callApi("getCourseDateOptions");
    const items = res.data.items || [];

    select.innerHTML = "<option value=''>請選擇</option>";

    items.forEach(v => {
      const op = document.createElement("option");
      op.value = v;
      op.text = v;
      select.appendChild(op);
    });
  } catch (err) {
    select.innerHTML = "<option value=''>載入失敗</option>";
    document.getElementById("summary").innerText = "❌ 查詢選單載入失敗：" + err.message;
  }
}

/************** 查詢資料 **************/
async function loadFiltered() {
  const val = document.getElementById("filterSelect").value;
  if (!val) return;

  try {
    const res = await callApi("getFilteredData", { option: val });
    const items = res.data.items || [];

    if (!items.length) {
      document.getElementById("queryTable").innerHTML = "⚠ 無資料";
      document.getElementById("summary").innerText = "";
      return;
    }

    let html = "<table>";
    html += "<tr><th>班級</th><th>座號</th><th>學號</th><th>姓名</th><th>選課名稱</th><th>科目名稱</th><th>日期</th><th>星期</th><th>節次</th><th>是否出席</th><th>備註</th></tr>";

    let total = items.length;
    let attend = 0;

    items.forEach(r => {
      if (r[9] === "出席") attend++;
      html += "<tr>" + r.map(c => "<td>" + escapeHtml(c) + "</td>").join("") + "</tr>";
    });

    html += "</table>";

    document.getElementById("queryTable").innerHTML = html;
    document.getElementById("summary").innerText =
      `應到 ${total} 人，已到 ${attend} 人，未到 ${total - attend} 人`;
  } catch (err) {
    document.getElementById("queryTable").innerHTML = "❌ 查詢失敗";
    document.getElementById("summary").innerText = err.message;
  }
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

/************** 初始化 **************/
document.addEventListener("DOMContentLoaded", async () => {
  await loadCourseNames();
  await loadOptions();
});
</script>

</body>
</html>
